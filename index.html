<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>理科デイリーチェック</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ユーザー選択画面 -->
  <div id="screen-user" class="screen active">
    <div class="user-select-body">
      <h1 class="app-title">理科デイリーチェック</h1>
      <p class="app-subtitle">ユーザーを選んでください</p>
      <div class="user-buttons">
        <button class="btn-user" data-user="さと">さと</button>
        <button class="btn-user" data-user="ぱぱ">ぱぱ</button>
      </div>
    </div>
  </div>

  <!-- 単元一覧画面 -->
  <div id="screen-units" class="screen">
    <header class="header">
      <button class="btn-icon" id="btn-switch-user">👤</button>
      <h1 class="header-title">理科デイリーチェック</h1>
      <span class="header-user" id="header-user-name"></span>
      <button class="btn-icon" id="btn-settings" style="font-size:18px;">⚙️</button>
    </header>
    <div class="unit-list" id="unit-list"></div>
  </div>

  <!-- 単元詳細画面（ページ一覧＋モード選択） -->
  <div id="screen-unit-detail" class="screen">
    <header class="header">
      <button class="btn-icon" id="btn-back-units">←</button>
      <h1 class="header-title" id="unit-detail-title"></h1>
    </header>
    <div class="unit-detail-body">
      <div class="mode-section">
        <h2 class="section-title">学習モード</h2>
        <div class="mode-buttons">
          <button class="btn btn-primary btn-large" data-mode="continue">続きから再開</button>
          <button class="btn btn-secondary btn-large" data-mode="all">全問を解く</button>
          <button class="btn btn-secondary btn-large" data-mode="below50">正答率 50% 以下を解く</button>
          <button class="btn btn-secondary btn-large" data-mode="below67">正答率 67% 以下を解く</button>
          <button class="btn btn-secondary btn-large" data-mode="below99">正答率 99% 以下を解く</button>
          <button class="btn btn-secondary btn-large" data-mode="unanswered">未回答問題を解く</button>
        </div>
      </div>
      <div class="accuracy-section">
        <h2 class="section-title">問題別正答率</h2>
        <div class="accuracy-table-wrapper" id="accuracy-table-wrapper"></div>
      </div>
      <div class="page-section">
        <h2 class="section-title">ページ一覧</h2>
        <div class="page-list" id="unit-page-list"></div>
      </div>
    </div>
  </div>

  <!-- クイズ画面 -->
  <div id="screen-quiz" class="screen">
    <header class="header">
      <button class="btn-icon" id="btn-back-detail">←</button>
      <span class="header-title" id="quiz-title"></span>
      <span class="header-page" id="quiz-page-info"></span>
    </header>

    <div class="canvas-wrapper" id="canvas-wrapper">
      <canvas id="quiz-canvas"></canvas>
    </div>

    <div class="controls">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <div class="control-row" id="reveal-row">
        <button class="btn btn-secondary" id="btn-undo">戻る</button>
        <button class="btn btn-primary" id="btn-reveal">答えを表示</button>
      </div>

      <div class="control-row hidden" id="judge-row">
        <button class="btn btn-correct" id="btn-correct">⭕ 正解</button>
        <button class="btn btn-incorrect" id="btn-incorrect">❌ 不正解</button>
      </div>

      <div class="control-row hidden" id="done-row">
        <button class="btn btn-secondary" id="btn-back-done">← 戻る</button>
        <button class="btn btn-primary" id="btn-results">結果を見る</button>
      </div>

      <div class="nav-row">
        <button class="btn btn-nav" id="btn-prev-page">◀ 前ページ</button>
        <span class="page-indicator" id="page-indicator">p1 / 1</span>
        <button class="btn btn-nav" id="btn-next-page">次ページ ▶</button>
      </div>
    </div>
  </div>

  <!-- 結果画面 -->
  <div id="screen-results" class="screen">
    <header class="header">
      <button class="btn-icon" id="btn-back-from-results">←</button>
      <span class="header-title">結果</span>
    </header>
    <div class="results-body">
      <div class="score-display">
        <span class="score-emoji" id="score-emoji">📚</span>
        <div class="score-numbers">
          <span class="score-correct" id="score-correct">0</span>
          <span class="score-divider">/</span>
          <span class="score-total" id="score-total">0</span>
        </div>
        <div class="score-percent" id="score-percent">0%</div>
      </div>
      <div class="results-actions">
        <button class="btn btn-primary btn-large" id="btn-retry-wrong">間違えた問題をやり直す</button>
        <button class="btn btn-secondary btn-large" id="btn-back-unit-detail">単元に戻る</button>
      </div>
    </div>
  </div>

  <!-- 設定画面 -->
  <div id="screen-settings" class="screen">
    <header class="header">
      <button class="btn-icon" id="btn-close-settings">←</button>
      <h1 class="header-title">設定</h1>
    </header>
    <div style="padding: 24px; max-width: 600px;">
      <h2 style="font-size: 16px; font-weight: 600; margin-bottom: 12px;">Google Sheets バックアップ</h2>
      <p style="font-size: 13px; color: #86868b; margin-bottom: 12px;">
        Google Apps ScriptのデプロイURLを入力してください。<br>
        回答するたびにスプレッドシートに自動バックアップされます。
      </p>
      <input type="text" id="settings-url" placeholder="https://script.google.com/macros/s/..."
        style="width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; margin-bottom: 12px;">
      <div style="display: flex; gap: 10px; flex-direction: column;">
        <button class="btn btn-primary" id="btn-save-settings">保存</button>
        <button class="btn btn-secondary" id="btn-restore">スプレッドシートから復元</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
